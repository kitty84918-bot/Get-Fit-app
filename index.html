<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍎個人營養與體重月曆 - 雲端完整版</title>
    <style>
        :root { 
            --primary-color: #a64d4d; 
            --bg-color: #fdf5f5; 
            --border-color: #e2b4b4; 
            --accent-color: #bc7a7a; 
            --edit-color: #2c5e8a; 
            --manage-bg: #f0f7ff; 
            --manage-primary: #3a7ebf; 
            --manage-border: #bcd4e6;
            --success-color: #2e7d32;
            --danger-color: #c62828;
            --weight-color: #5c6bc0;
            --workout-color: #e67e22;
        }
        body { background-color: var(--bg-color); font-family: "Microsoft JhengHei", sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 頂部分頁導航列 */
        .top-nav { background: white; padding: 10px 20px; border-bottom: 2px solid var(--border-color); display: flex; gap: 10px; z-index: 100; flex-shrink: 0; position: sticky; top: 0; }
        .tab-btn { padding: 10px 25px; border: none; background: #f0f4f8; border-radius: 8px; cursor: pointer; font-weight: bold; color: #666; font-size: 15px; transition: 0.3s; }
        .tab-btn:hover { background: #e2e8f0; }
        .tab-btn.active { background: var(--primary-color); color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-btn.workout-active { background: var(--workout-color); color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* 分頁內容容器 */
        .tab-content { display: flex; flex-direction: row; flex: 1; overflow: hidden; width: 100%; }
        
        /* --- 登入畫面 --- */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(253, 245, 245, 0.98); display: flex; justify-content: center; align-items: center; z-index: 1000; overflow-y: auto; padding: 20px 0; }
        .auth-container { display: flex; flex-direction: row; align-items: stretch; justify-content: center; gap: 40px; width: 95%; max-width: 1000px; }
        .auth-logo { flex: 1; width: 100%; max-width: 550px; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .auth-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border: 2px solid var(--border-color); box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
        .auth-box input { margin-bottom: 15px; }
        .auth-box button { margin-bottom: 10px; }

        /* --- 飲食月曆分頁樣式 --- */
        .calendar-section { flex: 2; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; color: var(--primary-color); }
        .manage-toggle-btn { background: var(--manage-primary); color: white; border: none; padding: 10px 20px; border-radius: 25px; font-size: 14px; cursor: pointer; font-weight: bold; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; flex-grow: 1; background: white; border-radius: 15px; padding: 15px; border: 2px solid var(--border-color); }
        .weekday { text-align: center; font-weight: bold; color: var(--accent-color); padding: 5px 0; border-bottom: 1px solid #eee; }
        .day-cell { border: 1px solid #f9f0f0; border-radius: 10px; padding: 6px; min-height: auto; display: flex; flex-direction: column; position: relative; background: #fff; cursor: pointer; box-sizing: border-box; }
        .day-cell.today { border: 2px solid var(--primary-color); background: #fffafb; }
        .day-cell.editing-target { border: 2px dashed var(--edit-color); background: #f0f7ff; }
        .date-num { font-size: 14px; font-weight: bold; color: #888; }
        .day-data { font-size: 10px; line-height: 1.2; margin: 4px 0; flex-grow: 1; display: flex; flex-direction: column; gap: 2px; }
        .day-data .cal { color: #d32f2f; font-weight: bold; }
        .day-data .pro { color: #388e3c; font-weight: bold; }
        .day-data .weight { color: var(--weight-color); font-weight: bold; margin-top: 2px; }
        .cell-btns { display: flex; gap: 4px; margin-top: auto; opacity: 0.1; transition: 0.3s; }
        .day-cell:hover .cell-btns { opacity: 1; }
        .mini-btn { flex: 1; font-size: 10px; padding: 2px 0; border-radius: 4px; border: none; color: white; cursor: pointer; }

        .input-section { flex: 1; background: white; border-left: 2px solid var(--border-color); padding: 25px; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.03); overflow-y: auto; transition: 0.3s; }
        .input-section.manage-mode { background-color: var(--manage-bg); border-left-color: var(--manage-border); }

        .status-tag { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
        .tag-today { background: #ffebeb; color: var(--primary-color); }
        .tag-edit { background: #e3f2fd; color: var(--edit-color); }
        .tag-manage { background: #dbeafe; color: var(--manage-primary); }

        h2 { margin: 0 0 15px 0; font-size: 20px; color: var(--primary-color); }
        .input-group { margin-bottom: 12px; }
        label { display: block; color: #8e6d6d; font-size: 13px; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; border: 1.5px solid #ebdada; border-radius: 8px; box-sizing: border-box; font-size: 14px; background: white; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .add-btn { background-color: var(--primary-color); color: white; margin-bottom: 8px; }
        .save-menu-btn { background-color: var(--manage-primary); color: white; }
        
        .target-box { background: #fdf8f8; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .target-box button { padding: 8px; font-size: 12px; margin-top: 5px; background: var(--accent-color); color: white; }
        .weight-box { background: #f0f4f8; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #c5d0e6; }
        .total-display { background: #fffafa; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: center; border: 1px dashed var(--border-color); }
        .stat-row { display: flex; justify-content: space-around; margin-top: 10px; }
        .stat-col { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 20px; font-weight: bold; color: var(--primary-color); }
        .stat-rem { font-size: 12px; font-weight: bold; margin-top: 3px; }
        .settle-btn { background-color: var(--accent-color); color: white; margin-top: 10px; }
        
        .menu-list-container { margin-top: 15px; border-top: 1px solid #d1e3f3; padding-top: 15px; }
        .menu-group-title { font-size: 13px; color: var(--manage-primary); font-weight: bold; background: #e1efff; padding: 5px 12px; border-radius: 5px; margin-top: 10px; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px solid #e1efff; font-size: 13px; background: white; margin: 2px 0; border-radius: 4px; }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px dashed #eee; font-size: 13px; }

        /* --- 運動表現分頁樣式 --- */
        .workout-sidebar { flex: 1; max-width: 300px; background: white; border-right: 2px solid #e2e8f0; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .workout-main { flex: 3; padding: 25px; overflow-y: auto; background: #fcfcfc; }
        
        .prog-card { background: #f8fafc; border: 1px solid #cbd5e1; padding: 15px; border-radius: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center;}
        .prog-card:hover { border-color: var(--workout-color); }
        .prog-card.active { border: 2px solid var(--workout-color); background: #fff7ed; }
        .prog-title { font-weight: bold; color: #334155; font-size: 15px;}
        
        .part-container { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        
        /* 展開/收合專用樣式 */
        .part-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid transparent; cursor: pointer; transition: 0.2s; user-select: none; }
        .part-header:hover { opacity: 0.7; }
        .part-header.active { border-bottom-color: #f1f5f9; padding-bottom: 10px; margin-bottom: 0; }
        .part-header h3 { margin: 0; color: #475569; font-size: 18px; display: flex; align-items: center; }
        
        .toggle-icon { display: inline-block; transition: transform 0.3s; margin-right: 10px; font-size: 14px; color: #94a3b8; }
        .toggle-icon.expanded { transform: rotate(90deg); color: var(--workout-color); }
        
        .part-content { display: none; padding-top: 15px; }
        .part-content.expanded { display: block; }
        
        .ex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; background: #f8fafc; padding: 10px; border-radius: 8px; flex-wrap: wrap; }
        .ex-row input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: white; }
        .ex-row input:focus { border-color: var(--workout-color); outline: none; }
        .ex-name { flex: 2; min-width: 120px; }
        .ex-num { flex: 1; min-width: 60px; max-width: 90px; }
        .ex-label { font-size: 12px; color: #64748b; margin-right: 4px; font-weight: bold;}
        
        .btn-icon { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 16px; padding: 4px; opacity: 0.7; transition: 0.2s; }
        .btn-icon:hover { opacity: 1; transform: scale(1.1); }
        
        .add-part-btn { background: #f1f5f9; color: #475569; border: 1px dashed #cbd5e1; margin-top: 10px; }
        .add-submit-btn { background: var(--workout-color); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .add-submit-btn:hover { background: #d35400; }

        /* --- 手機版響應式修正 --- */
        @media (max-width: 900px) { 
            body { height: auto; overflow-y: auto; }
            
            .auth-container { flex-direction: column; gap: 20px; align-items: center; width: 90%; }
            .auth-logo, .auth-box { width: 100%; max-width: 500px; }

            .tab-content { flex-direction: column; height: auto; overflow: visible; }
            .input-section { order: 1; flex: none; width: 100%; box-sizing: border-box; border-left: none; border-bottom: 2px solid var(--border-color); overflow-y: visible; }
            .calendar-section { order: 2; flex: none; height: auto; width: 100%; box-sizing: border-box; padding-bottom: 40px; } 
            .calendar-grid { padding: 8px; gap: 4px; grid-template-columns: repeat(7, 1fr); }
            .day-cell { padding: 4px; min-height: 95px; }
            .cell-btns { opacity: 1; flex-direction: row; gap: 2px; margin-top: 4px; }
            .mini-btn { padding: 4px 0; font-size: 9px; }

            .workout-main { order: 1; padding: 15px; }
            .workout-sidebar { order: 2; max-width: none; border-right: none; border-top: 2px solid #e2e8f0; }
            
            .ex-row { flex-direction: column; align-items: stretch; }
            .ex-row > div { display: flex; align-items: center; justify-content: space-between; }
            .ex-num { max-width: none; width: 60%; }
            .add-submit-btn { width: 100%; margin-top: 8px; padding: 12px; } /* 手機版按鈕加寬加高 */
        }
    </style>
</head>
<body>

<div class="top-nav" id="topNav" style="display: none;">
    <button class="tab-btn active" id="tabBtnNutrition" onclick="switchTab('nutrition')">🍎 飲食與體重</button>
    <button class="tab-btn" id="tabBtnWorkout" onclick="switchTab('workout')">💪 運動表現</button>
</div>

<div id="authOverlay">
    <div class="auth-container">
        <img src="https://res.cloudinary.com/dsgn3pwep/image/upload/v1774851002/1x1_jlfbmm.png" alt="App Logo" class="auth-logo">
        <div class="auth-box">
            <h2 style="color: var(--primary-color); margin-top: 0;">🍎 雲端健康日誌</h2>
            <input type="email" id="authEmail" placeholder="電子郵件">
            <input type="password" id="authPassword" placeholder="密碼 (至少6碼)">
            <button style="background: var(--primary-color); color: white;" onclick="handleLogin()">登入</button>
            <button style="background: white; color: var(--primary-color); border: 2px solid var(--primary-color);" onclick="handleRegister()">註冊新帳號</button>
            <div id="authMsg" style="color: red; font-size: 12px; margin-top: 10px;"></div>
        </div>
    </div>
</div>

<div id="nutritionTab" class="tab-content">
    <div class="calendar-section">
        <button class="manage-toggle-btn" onclick="toggleMode('manage')">🍴 管理自訂菜單</button>
        <div class="calendar-header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <button onclick="changeMonth(-1)" style="padding: 5px 15px; width: auto; background: var(--manage-bg); color: var(--edit-color); border: 1px solid var(--manage-border);">◀</button>
                <h3 id="monthTitle" style="margin: 0; min-width: 110px; text-align: center;">月曆</h3>
                <button onclick="changeMonth(1)" style="padding: 5px 15px; width: auto; background: var(--manage-bg); color: var(--edit-color); border: 1px solid var(--manage-border);">▶</button>
            </div>
            <div>
                <span id="userEmailDisplay" style="font-size: 12px; margin-right: 10px; color: #666;"></span>
                <button onclick="handleLogout()" style="width: auto; padding: 5px 10px; font-size: 12px; background: #888; color: white;">登出</button>
            </div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="input-section" id="rightPanel">
        <div id="recordUI">
            <div class="header-row" style="display:flex; justify-content:space-between;">
                <div id="statusTag" class="status-tag tag-today">今日紀錄</div>
                <button id="cancelEditBtn" style="display:none; border:none; background:none; color:#999; cursor:pointer;" onclick="switchToDate(todayDateStr)">✖ 取消補登</button>
            </div>
            
            <div class="target-box">
                <div class="row" style="margin-bottom:0;">
                    <div><label>🎯 TDEE 目標</label><input type="number" id="setTDEE" placeholder="例: 2000"></div>
                    <div><label>💪 蛋白質目標</label><input type="number" id="setPro" placeholder="例: 120"></div>
                </div>
                <button onclick="saveTargets()">💾 更新個人目標</button>
            </div>

            <div class="weight-box">
                <div class="row" style="margin-bottom:0; align-items: center;">
                    <div style="flex:1;">
                        <label style="color:var(--weight-color)">⚖️ 紀錄體重 (kg)</label>
                        <input type="number" id="dailyWeight" step="0.1" placeholder="例: 65.5">
                    </div>
                    <div style="width: 80px;">
                        <button onclick="saveWeight()" style="background:var(--weight-color); color:white; margin-top: 20px; padding: 10px;">儲存</button>
                    </div>
                </div>
            </div>

            <h2 id="inputTitle">🍎 新增飲食紀錄</h2>
            <div class="input-group">
                <label>快速選擇菜單</label>
                <div class="row">
                    <select id="categorySelect" onchange="updateFoodSubSelect()"></select>
                    <select id="foodSubSelect" onchange="autoFillFromSub()"></select>
                </div>
            </div>
            <div class="input-group">
                <label>食物名稱 (可手動輸入)</label>
                <input type="text" id="recName" placeholder="例如：拿鐵">
            </div>
            <div class="row">
                <div><label>熱量 (kcal)</label><input type="number" id="recCal" placeholder="0"></div>
                <div><label>蛋白質 (g)</label><input type="number" id="recPro" placeholder="0"></div>
            </div>
            <button class="add-btn" id="addBtnRec" onclick="addEntryToLog()">加入今日累計 ＋</button>
            
            <div class="total-display">
                <div style="font-size: 14px; color: #666;">當前累計總合</div>
                <div class="stat-row">
                    <div class="stat-col">
                        <span class="stat-val" id="curCal">0 <small>kcal</small></span>
                        <span class="stat-rem" id="remCal"></span>
                    </div>
                    <div class="stat-col">
                        <span class="stat-val" id="curPro">0 <small>g</small></span>
                        <span class="stat-rem" id="remPro"></span>
                    </div>
                </div>
            </div>
            <button class="settle-btn" onclick="settleToCalendar()">同步至月曆 💾</button>
            <div id="todayFoodList" style="margin-top:15px; font-size:12px; color:#666; border-top:1px solid #eee; padding-top:10px;"></div>
        </div>

        <div id="manageUI" style="display:none;">
            <div class="status-tag tag-manage">菜單管理模式</div>
            <h2>🍴 建立食物清單</h2>
            <div class="input-group">
                <label>1. 群組名稱</label>
                <input type="text" id="mGroup" list="mGroups" placeholder="例如：早餐">
                <datalist id="mGroups"></datalist>
            </div>
            <div class="input-group">
                <label>2. 食物名稱</label>
                <input type="text" id="mName" placeholder="例如：三明治">
            </div>
            <div class="row">
                <div><label>熱量</label><input type="number" id="mCal" placeholder="0"></div>
                <div><label>蛋白質</label><input type="number" id="mPro" placeholder="0"></div>
            </div>
            <button class="save-menu-btn" onclick="saveToMenu()">儲存到清單 ＋</button>
            <button style="margin-top:10px; background:#e2e8f0; color:#475569;" onclick="toggleMode('record')">← 返回紀錄模式</button>
            <div class="menu-list-container" id="menuListView"></div>
        </div>
    </div>
</div>

<div id="workoutTab" class="tab-content" style="display: none;">
    <div class="workout-sidebar">
        <h2 style="color: var(--workout-color); font-size: 18px; margin-top: 0;">📋 訓練課表</h2>
        <button style="background: var(--workout-color); color: white; margin-bottom: 15px;" onclick="addWorkoutProgram()">＋ 新增課表</button>
        <div id="programList">
            </div>
    </div>
    
    <div class="workout-main" id="workoutDetail">
        <div style="text-align: center; color: #94a3b8; margin-top: 50px;">
            請由左側 (或下方) 選擇一個訓練課表開始紀錄
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

    // ⚠️ 貼上你從 Firebase Console 取得的金鑰設定 ⚠️
    const firebaseConfig = {
        apiKey: "AIzaSyA5bjn998Uv2WAqG8hrVxC3ttuBYQMgnlU",
        authDomain: "get-fit-8b5f5.firebaseapp.com",
        projectId: "get-fit-8b5f5",
        storageBucket: "get-fit-8b5f5.firebasestorage.app",
        messagingSenderId: "683811288810",
        appId: "1:683811288810:web:d807bcbd49add92c6fc993"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserUID = null;
    let myTargets = { tdee: 0, pro: 0 };
    let allDailyData = {};
    let monthData = {};
    let customMenu = {}; 
    let workoutPrograms = [];
    let currentProgramIdx = -1;
    let expandedParts = new Set(); // 儲存展開的訓練部位索引

    const now = new Date();
    let currentYear = now.getFullYear();
    let currentMonth = now.getMonth();
    const todayDateStr = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
    let editingDate = todayDateStr;

    window.switchTab = (tab) => {
        document.getElementById('nutritionTab').style.display = tab === 'nutrition' ? 'flex' : 'none';
        document.getElementById('workoutTab').style.display = tab === 'workout' ? 'flex' : 'none';
        
        document.getElementById('tabBtnNutrition').className = tab === 'nutrition' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('tabBtnWorkout').className = tab === 'workout' ? 'tab-btn workout-active' : 'tab-btn';
        
        if (tab === 'workout') {
            renderProgramList();
            renderProgramDetail();
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUserUID = user.uid;
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('topNav').style.display = 'flex'; 
            document.getElementById('userEmailDisplay').innerText = user.email;
            await loadUserDataFromDB();
            initAppUI();
        } else {
            currentUserUID = null;
            document.getElementById('authOverlay').style.display = 'flex';
            document.getElementById('topNav').style.display = 'none';
        }
    });

    window.handleLogin = async () => {
        const e = document.getElementById('authEmail').value;
        const p = document.getElementById('authPassword').value;
        try { await signInWithEmailAndPassword(auth, e, p); } 
        catch (error) { document.getElementById('authMsg').innerText = "登入失敗：" + error.message; }
    };

    window.handleRegister = async () => {
        const e = document.getElementById('authEmail').value;
        const p = document.getElementById('authPassword').value;
        try { await createUserWithEmailAndPassword(auth, e, p); } 
        catch (error) { document.getElementById('authMsg').innerText = "註冊失敗：" + error.message; }
    };

    window.handleLogout = () => signOut(auth);

    async function loadUserDataFromDB() {
        if (!currentUserUID) return;
        const docSnap = await getDoc(doc(db, "users", currentUserUID));
        if (docSnap.exists()) {
            const data = docSnap.data();
            myTargets = data.targets || { tdee: 0, pro: 0 };
            allDailyData = data.allDailyData || {};
            monthData = data.monthData || {};
            customMenu = data.customMenu || {};
            workoutPrograms = data.workoutPrograms || [];
        } else {
            myTargets = { tdee: 0, pro: 0 }; allDailyData = {}; monthData = {}; customMenu = {}; workoutPrograms = [];
        }
        document.getElementById('setTDEE').value = myTargets.tdee || '';
        document.getElementById('setPro').value = myTargets.pro || '';
    }

    async function syncToDB() {
        if (!currentUserUID) return;
        await setDoc(doc(db, "users", currentUserUID), {
            targets: myTargets,
            allDailyData: allDailyData,
            monthData: monthData,
            customMenu: customMenu,
            workoutPrograms: workoutPrograms
        });
    }

    window.addWorkoutProgram = async () => {
        const name = prompt("請輸入新訓練課表名稱：\n(例如：胸背肩腿 - 推日)");
        if (!name || name.trim() === "") return;
        workoutPrograms.push({ name: name.trim(), parts: [] });
        currentProgramIdx = workoutPrograms.length - 1;
        expandedParts.clear(); // 新課表清空展開狀態
        await syncToDB();
        renderProgramList();
        renderProgramDetail();
    };

    window.deleteProgram = async (idx, event) => {
        event.stopPropagation();
        if (confirm(`確定要刪除課表「${workoutPrograms[idx].name}」嗎？`)) {
            workoutPrograms.splice(idx, 1);
            if (currentProgramIdx === idx) {
                currentProgramIdx = -1;
                expandedParts.clear();
            }
            else if (currentProgramIdx > idx) currentProgramIdx--;
            await syncToDB();
            renderProgramList();
            renderProgramDetail();
        }
    };

    window.selectProgram = (idx) => {
        currentProgramIdx = idx;
        expandedParts.clear(); // 切換課表時，自動收起所有部位
        renderProgramList();
        renderProgramDetail();
        
        if (window.innerWidth <= 900) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    };

    function renderProgramList() {
        const listDiv = document.getElementById('programList');
        listDiv.innerHTML = '';
        workoutPrograms.forEach((prog, idx) => {
            listDiv.innerHTML += `
                <div class="prog-card ${idx === currentProgramIdx ? 'active' : ''}" onclick="selectProgram(${idx})">
                    <span class="prog-title">${prog.name}</span>
                    <button class="btn-icon" onclick="deleteProgram(${idx}, event)">🗑️</button>
                </div>
            `;
        });
    }

    window.addPart = async () => {
        if (currentProgramIdx === -1) return;
        const partName = prompt("請輸入訓練部位：\n(例如：胸部、背部、肩部、腿部)");
        if (!partName || partName.trim() === "") return;
        workoutPrograms[currentProgramIdx].parts.push({ name: partName.trim(), exercises: [] });
        
        // 自動將新建立的部位展開
        const newPtIdx = workoutPrograms[currentProgramIdx].parts.length - 1;
        expandedParts.add(newPtIdx);
        
        await syncToDB();
        renderProgramDetail();
    };

    window.deletePart = async (ptIdx, event) => {
        event.stopPropagation(); // 避免觸發收合展開
        if (confirm(`確定要刪除部位「${workoutPrograms[currentProgramIdx].parts[ptIdx].name}」及其內含的所有項目嗎？`)) {
            workoutPrograms[currentProgramIdx].parts.splice(ptIdx, 1);
            expandedParts.delete(ptIdx);
            await syncToDB();
            renderProgramDetail();
        }
    };

    window.deleteExercise = async (ptIdx, exIdx) => {
        const exName = workoutPrograms[currentProgramIdx].parts[ptIdx].exercises[exIdx].name || "此項目";
        if (confirm(`確定要刪除「${exName}」嗎？`)) {
            workoutPrograms[currentProgramIdx].parts[ptIdx].exercises.splice(exIdx, 1);
            await syncToDB();
            renderProgramDetail();
        }
    };

    window.updateExField = (ptIdx, exIdx, field, element) => {
        let val = element.value;
        if (field !== 'name') {
            val = val === '' ? '' : parseInt(val, 10);
            if (isNaN(val)) val = '';
            element.value = val; 
        }
        workoutPrograms[currentProgramIdx].parts[ptIdx].exercises[exIdx][field] = val;
        syncToDB(); 
    };

    window.submitNewExercise = async (ptIdx) => {
        const nameEl = document.getElementById(`newExName_${ptIdx}`);
        const weightEl = document.getElementById(`newExWeight_${ptIdx}`);
        const rmEl = document.getElementById(`newExRm_${ptIdx}`);
        const setsEl = document.getElementById(`newExSets_${ptIdx}`);
        
        const name = nameEl.value.trim();
        if (!name) {
            alert("請輸入項目名稱！");
            return;
        }
        
        let weight = weightEl.value === '' ? '' : parseInt(weightEl.value, 10);
        if (isNaN(weight)) weight = '';
        
        let rm = rmEl.value === '' ? '' : parseInt(rmEl.value, 10);
        if (isNaN(rm)) rm = '';
        
        let sets = setsEl.value === '' ? '' : parseInt(setsEl.value, 10);
        if (isNaN(sets)) sets = '';

        workoutPrograms[currentProgramIdx].parts[ptIdx].exercises.push({ name, weight, rm, sets });
        await syncToDB();
        renderProgramDetail();
    };

    // 點擊部位標題切換展開/收合
    window.togglePart = (ptIdx) => {
        if (expandedParts.has(ptIdx)) {
            expandedParts.delete(ptIdx);
        } else {
            expandedParts.add(ptIdx);
        }
        renderProgramDetail();
    };

    function renderProgramDetail() {
        const detailDiv = document.getElementById('workoutDetail');
        if (currentProgramIdx === -1 || !workoutPrograms[currentProgramIdx]) {
            detailDiv.innerHTML = `<div style="text-align: center; color: #94a3b8; margin-top: 50px;">請由左側 (或下方) 選擇一個訓練課表開始紀錄</div>`;
            return;
        }

        const prog = workoutPrograms[currentProgramIdx];
        let html = `<h2 style="color: #334155; margin-top:0; border-bottom: 2px solid var(--workout-color); padding-bottom: 10px;">🏋️ ${prog.name}</h2>`;
        
        prog.parts.forEach((part, ptIdx) => {
            const isExpanded = expandedParts.has(ptIdx);
            const headerClass = isExpanded ? 'part-header active' : 'part-header';
            const iconClass = isExpanded ? 'toggle-icon expanded' : 'toggle-icon';
            const contentClass = isExpanded ? 'part-content expanded' : 'part-content';

            html += `
                <div class="part-container">
                    <div class="${headerClass}" onclick="togglePart(${ptIdx})">
                        <h3><span class="${iconClass}">▶</span> ${part.name}</h3>
                        <button class="btn-icon" onclick="deletePart(${ptIdx}, event)">✖</button>
                    </div>
                    <div class="${contentClass}">
                        <div id="exList_${ptIdx}">
            `;
            
            // 渲染已儲存的項目
            part.exercises.forEach((ex, exIdx) => {
                html += `
                    <div class="ex-row">
                        <div>
                            <span class="ex-label">項目</span>
                            <input type="text" class="ex-name" placeholder="例如: 槓鈴臥推" value="${ex.name}" onchange="updateExField(${ptIdx}, ${exIdx}, 'name', this)">
                        </div>
                        <div>
                            <span class="ex-label">重量</span>
                            <input type="number" class="ex-num" step="1" placeholder="kg" value="${ex.weight}" onchange="updateExField(${ptIdx}, ${exIdx}, 'weight', this)">
                        </div>
                        <div>
                            <span class="ex-label">RM</span>
                            <input type="number" class="ex-num" step="1" placeholder="次" value="${ex.rm}" onchange="updateExField(${ptIdx}, ${exIdx}, 'rm', this)">
                        </div>
                        <div>
                            <span class="ex-label">組數</span>
                            <input type="number" class="ex-num" step="1" placeholder="組" value="${ex.sets}" onchange="updateExField(${ptIdx}, ${exIdx}, 'sets', this)">
                        </div>
                        <button class="btn-icon" onclick="deleteExercise(${ptIdx}, ${exIdx})" style="margin-left:auto;">🗑️</button>
                    </div>
                `;
            });

            // 新增輸入專區
            html += `
                        </div>
                        <div class="ex-row" style="background: #eff6ff; border: 1px dashed #93c5fd; margin-top: 15px;">
                            <div>
                                <span class="ex-label" style="color:#2563eb;">新項目</span>
                                <input type="text" id="newExName_${ptIdx}" class="ex-name" placeholder="例如: 槓鈴臥推">
                            </div>
                            <div>
                                <span class="ex-label">重量</span>
                                <input type="number" id="newExWeight_${ptIdx}" class="ex-num" step="1" placeholder="kg">
                            </div>
                            <div>
                                <span class="ex-label">RM</span>
                                <input type="number" id="newExRm_${ptIdx}" class="ex-num" step="1" placeholder="次">
                            </div>
                            <div>
                                <span class="ex-label">組數</span>
                                <input type="number" id="newExSets_${ptIdx}" class="ex-num" step="1" placeholder="組">
                            </div>
                            <button class="add-submit-btn" onclick="submitNewExercise(${ptIdx})">＋ 加入</button>
                        </div>
                    </div>
                </div>
            `;
        });

        html += `<button class="add-btn add-part-btn" onclick="addPart()">＋ 新增訓練部位</button>`;
        detailDiv.innerHTML = html;
    }

    function initAppUI() {
        document.getElementById('monthTitle').innerText = `${currentYear}年 ${currentMonth + 1}月`;
        renderCalendar();
        updateSelectors();
        window.switchToDate(todayDateStr);
    }

    window.changeMonth = (offset) => {
        currentMonth += offset;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; } 
        else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        document.getElementById('monthTitle').innerText = `${currentYear}年 ${currentMonth + 1}月`;
        renderCalendar();
    };

    window.saveTargets = async () => {
        myTargets.tdee = parseFloat(document.getElementById('setTDEE').value) || 0;
        myTargets.pro = parseFloat(document.getElementById('setPro').value) || 0;
        await syncToDB();
        alert("目標已儲存！");
        window.switchToDate(editingDate);
    };

    window.saveWeight = async () => {
        const w = parseFloat(document.getElementById('dailyWeight').value) || 0;
        if (w === 0) return alert("請輸入有效的體重數字！");

        if (!allDailyData[editingDate]) allDailyData[editingDate] = { cal: 0, pro: 0, list: [], weight: 0 };
        allDailyData[editingDate].weight = w;
        
        if (!monthData[editingDate]) monthData[editingDate] = { cal: 0, pro: 0, weight: 0 };
        monthData[editingDate].weight = w;
        
        await syncToDB();
        
        const btn = document.querySelector('.weight-box button');
        const originText = btn.innerText;
        btn.innerText = "✅ 已儲存";
        btn.style.backgroundColor = "#4caf50";
        setTimeout(() => { btn.innerText = originText; btn.style.backgroundColor = "var(--weight-color)"; }, 1500);

        renderCalendar();
    };

    window.toggleMode = (mode) => {
        const panel = document.getElementById('rightPanel');
        if (mode === 'manage') {
            panel.classList.add('manage-mode');
            document.getElementById('recordUI').style.display = 'none';
            document.getElementById('manageUI').style.display = 'block';
            renderManageList();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            panel.classList.remove('manage-mode');
            document.getElementById('recordUI').style.display = 'block';
            document.getElementById('manageUI').style.display = 'none';
            updateSelectors();
        }
    };

    window.saveToMenu = async () => {
        const g = document.getElementById('mGroup').value.trim();
        const n = document.getElementById('mName').value.trim();
        const c = parseFloat(document.getElementById('mCal').value) || 0;
        const p = parseFloat(document.getElementById('mPro').value) || 0;
        if (!g || !n) return;
        if (!customMenu[g]) customMenu[g] = [];
        customMenu[g].push({ name: n, cal: c, pro: p });
        await syncToDB();
        renderManageList();
        ['mName', 'mCal', 'mPro'].forEach(id => document.getElementById(id).value = '');
    };

    function renderManageList() {
        const view = document.getElementById('menuListView');
        const dl = document.getElementById('mGroups');
        view.innerHTML = ''; dl.innerHTML = '';
        for (let group in customMenu) {
            const opt = document.createElement('option'); opt.value = group; dl.appendChild(opt);
            const groupDiv = document.createElement('div');
            groupDiv.innerHTML = `<div class="menu-group-title">${group}</div>`;
            customMenu[group].forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'menu-item';
                itemDiv.innerHTML = `<span>${item.name} <small>(🔥${item.cal}/💪${item.pro}g)</small></span>
                    <span style="color:#ff8a8a; cursor:pointer;" onclick="deleteMenuItem('${group}', ${index})">🗑️</span>`;
                groupDiv.appendChild(itemDiv);
            });
            view.appendChild(groupDiv);
        }
    }

    window.deleteMenuItem = async (group, index) => {
        if (confirm(`刪除「${customMenu[group][index].name}」？`)) {
            customMenu[group].splice(index, 1);
            if (customMenu[group].length === 0) delete customMenu[group];
            await syncToDB();
            renderManageList();
            updateSelectors();
        }
    };

    function updateSelectors() {
        const catS = document.getElementById('categorySelect');
        catS.innerHTML = '<option value="">--請選擇群組--</option>';
        for (let g in customMenu) {
            const opt = document.createElement('option'); opt.value = g; opt.innerText = g; catS.appendChild(opt);
        }
        window.updateFoodSubSelect();
    }

    window.updateFoodSubSelect = () => {
        const cat = document.getElementById('categorySelect').value;
        const subS = document.getElementById('foodSubSelect');
        subS.innerHTML = '<option value="">--請選擇食物--</option>';
        if (customMenu[cat]) {
            customMenu[cat].forEach((item, idx) => {
                const opt = document.createElement('option');
                opt.value = idx; opt.innerText = item.name; subS.appendChild(opt);
            });
        }
    };

    window.autoFillFromSub = () => {
        const cat = document.getElementById('categorySelect').value;
        const idx = document.getElementById('foodSubSelect').value;
        if (customMenu[cat] && customMenu[cat][idx]) {
            document.getElementById('recName').value = customMenu[cat][idx].name;
            document.getElementById('recCal').value = customMenu[cat][idx].cal;
            document.getElementById('recPro').value = customMenu[cat][idx].pro;
        }
    };

    window.addEntryToLog = async () => {
        const nameVal = document.getElementById('recName').value.trim();
        const calVal = parseFloat(document.getElementById('recCal').value) || 0;
        const proVal = parseFloat(document.getElementById('recPro').value) || 0;
        if (!nameVal) { alert("請輸入食物名稱！"); return; }

        if (!allDailyData[editingDate]) allDailyData[editingDate] = { cal: 0, pro: 0, list: [], weight: 0 };
        allDailyData[editingDate].cal += calVal;
        allDailyData[editingDate].pro += proVal;
        allDailyData[editingDate].list.push({ name: nameVal, cal: calVal, pro: proVal });
        
        await syncToDB();

        document.getElementById('recName').value = '';
        document.getElementById('recCal').value = '';
        document.getElementById('recPro').value = '';
        document.getElementById('categorySelect').value = '';
        window.updateFoodSubSelect();

        window.switchToDate(editingDate);
    };

    window.removeEntryFromLog = async (index) => {
        const data = allDailyData[editingDate];
        if (!data || !data.list[index]) return;
        data.cal -= data.list[index].cal;
        data.pro -= data.list[index].pro;
        data.list.splice(index, 1);
        await syncToDB();
        window.switchToDate(editingDate);
    };

    window.switchToDate = (dateStr) => {
        editingDate = dateStr;
        const isToday = (dateStr === todayDateStr);
        
        if(document.getElementById('workoutTab').style.display === 'flex') {
            window.switchTab('nutrition');
        }

        window.toggleMode('record');
        document.getElementById('statusTag').className = isToday ? "status-tag tag-today" : "status-tag tag-edit";
        document.getElementById('statusTag').innerText = isToday ? "今日紀錄" : `補登：${dateStr.split('-')[2]}日`;
        document.getElementById('cancelEditBtn').style.display = isToday ? "none" : "block";
        
        const data = allDailyData[dateStr] || { cal: 0, pro: 0, list: [], weight: 0 };
        
        document.getElementById('curCal').innerText = `${Math.round(data.cal)} kcal`;
        document.getElementById('curPro').innerText = `${data.pro.toFixed(1)} g`;
        document.getElementById('dailyWeight').value = data.weight || '';
        
        if(myTargets.tdee > 0) {
            let remC = myTargets.tdee - data.cal;
            let remCElem = document.getElementById('remCal');
            remCElem.innerText = `剩餘: ${Math.round(remC)} kcal`;
            remCElem.style.color = remC < 0 ? "var(--danger-color)" : "var(--success-color)";
        } else {
            document.getElementById('remCal').innerText = "未設定目標";
            document.getElementById('remCal').style.color = "#999";
        }

        if(myTargets.pro > 0) {
            let remP = myTargets.pro - data.pro;
            let remPElem = document.getElementById('remPro');
            remPElem.innerText = `剩餘: ${remP.toFixed(1)} g`;
            remPElem.style.color = remP < 0 ? "var(--success-color)" : "#e68a00";
        } else {
            document.getElementById('remPro').innerText = "未設定目標";
            document.getElementById('remPro').style.color = "#999";
        }
        
        const listDiv = document.getElementById('todayFoodList');
        listDiv.innerHTML = data.list && data.list.length ? '<b>今日已選：</b>' : '';
        if(data.list) {
            data.list.forEach((i, idx) => {
                listDiv.innerHTML += `
                    <div class="log-item">
                        <span>· ${i.name} (${i.cal}kcal / ${i.pro}g)</span>
                        <span style="color:#ff8a8a; cursor:pointer;" onclick="removeEntryFromLog(${idx})">✖</span>
                    </div>`;
            });
        }
        renderCalendar();
        if (window.innerWidth <= 900) window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.settleToCalendar = async () => {
        const data = allDailyData[editingDate] || { cal:0, pro:0, weight:0 };
        monthData[editingDate] = { 
            cal: Math.round(data.cal), 
            pro: parseFloat(data.pro.toFixed(1)),
            weight: data.weight || 0
        };
        await syncToDB();
        
        const btn = document.querySelector('.settle-btn');
        const originText = btn.innerText;
        btn.innerText = "✅ 同步成功！";
        btn.style.backgroundColor = "#4caf50";
        setTimeout(() => { btn.innerText = originText; btn.style.backgroundColor = "var(--accent-color)"; }, 1500);

        if (editingDate !== todayDateStr) window.switchToDate(todayDateStr);
        else renderCalendar();
    };

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const headers = `<div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div><div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div>`;
        grid.innerHTML = headers;
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${currentMonth}-${d}`;
            const cell = document.createElement('div');
            cell.className = `day-cell ${dateStr === todayDateStr ? 'today' : ''} ${dateStr === editingDate ? 'editing-target' : ''}`;
            const data = monthData[dateStr]; 
            
            let weightHtml = data && data.weight ? `<div class="weight">⚖️${data.weight}</div>` : '';
            
            cell.innerHTML = `
                <div class="date-num">${d}</div>
                <div class="day-data">
                    ${data && data.cal ? `<div class="cal">🔥${data.cal}</div><div class="pro">💪${data.pro}</div>` : ''}
                    ${weightHtml}
                </div>
                <div class="cell-btns">
                    <button class="mini-btn" style="background:#2c5e8a" onclick="switchToDate('${dateStr}')">📝</button>
                    <button class="mini-btn" style="background:#cc9999" onclick="deleteDayRecord('${dateStr}', event)">🗑️</button>
                </div>`;
            grid.appendChild(cell);
        }
    }

    window.deleteDayRecord = async (dateStr, e) => {
        e.stopPropagation();
        if (confirm(`刪除 ${dateStr.split('-')[2]} 日所有紀錄？`)) {
            delete allDailyData[dateStr]; delete monthData[dateStr];
            await syncToDB();
            window.switchToDate(editingDate);
        }
    };
</script>
</body>
</html>
